[package]
name = "psm-rust-example"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "e2e"
path = "src/e2e.rs"

[dependencies]
private-state-manager-client = { path = "../../crates/client" }
private-state-manager-shared = { path = "../../crates/shared" }
miden-keystore = { path = "../../crates/miden-keystore" }
miden-objects = "0.11.4"
miden-lib = "0.11.4"
tokio = { version = "1.42", features = ["full"] }
hex = "0.4"
tempfile = "3.15"
rand_chacha = "0.9"
