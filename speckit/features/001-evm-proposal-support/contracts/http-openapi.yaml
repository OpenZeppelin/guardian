openapi: 3.1.0
info:
  title: Guardian Domain-Separated EVM Proposal Support
  version: 0.2.0-draft
  description: >
    Draft HTTP contract for feature-gated EVM account registration, wallet
    sessions, and proposal coordination. Miden keeps the existing /configure,
    /delta, /delta/proposal, and /state contract. EVM behavior is exposed only
    under /evm/*. Default builds do not register this EVM HTTP surface.
paths:
  /evm/auth/challenge:
    get:
      summary: Create an EIP-712 wallet login challenge
      parameters:
        - in: query
          name: address
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvmChallenge'
        '400':
          description: EVM feature disabled or malformed address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /evm/auth/verify:
    post:
      summary: Verify an EIP-712 challenge and set the EVM session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvmVerifyRequest'
      responses:
        '200':
          description: Session established
          headers:
            Set-Cookie:
              schema:
                type: string
              description: guardian_evm_session cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvmSession'
        '400':
          description: Feature disabled, challenge expired, challenge replayed, or invalid signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /evm/auth/logout:
    post:
      summary: Clear the EVM session cookie
      responses:
        '200':
          description: Session cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: EVM feature disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /evm/accounts:
    post:
      summary: Register an EVM smart account for Guardian proposal coordination
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterEvmAccountRequest'
      responses:
        '200':
          description: Account registered or refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterEvmAccountResponse'
        '400':
          description: Feature disabled, unsupported chain, missing chain config, or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /evm/proposals:
    post:
      summary: Create an EVM proposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvmProposalRequest'
      responses:
        '200':
          description: Proposal created or existing proposal returned idempotently
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvmProposal'
        '400':
          description: Feature disabled, unauthorized signer, duplicate signature, or invalid proposal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: List pending EVM proposals for an account
      parameters:
        - in: query
          name: account_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Pending proposals visible to the session signer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEvmProposalsResponse'
        '400':
          description: Feature disabled, missing session, or unsupported account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /evm/proposals/{proposal_id}:
    get:
      summary: Get one pending EVM proposal
      parameters:
        - in: path
          name: proposal_id
          required: true
          schema:
            type: string
        - in: query
          name: account_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Proposal found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvmProposal'
        '404':
          description: Proposal not found or lazily removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /evm/proposals/{proposal_id}/approve:
    post:
      summary: Add the session signer's ECDSA signature to an EVM proposal
      parameters:
        - in: path
          name: proposal_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveEvmProposalRequest'
      responses:
        '200':
          description: Proposal updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvmProposal'
        '400':
          description: Feature disabled, unauthorized signer, duplicate signature, or invalid signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /evm/proposals/{proposal_id}/executable:
    get:
      summary: Export an executable EVM proposal once threshold is reached
      parameters:
        - in: path
          name: proposal_id
          required: true
          schema:
            type: string
        - in: query
          name: account_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Executable proposal export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutableEvmProposal'
        '400':
          description: Feature disabled or threshold not reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /evm/proposals/{proposal_id}/cancel:
    post:
      summary: Remove a pending EVM proposal
      parameters:
        - in: path
          name: proposal_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelEvmProposalRequest'
      responses:
        '200':
          description: Proposal removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Feature disabled, missing session, or unauthorized signer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /configure:
    post:
      summary: Miden account configuration
      description: EVM accounts are registered through /evm/accounts.
  /delta/proposal:
    post:
      summary: Miden proposal creation
      description: EVM proposals are created through /evm/proposals.
    get:
      summary: Miden proposal listing
      description: EVM proposals are listed through /evm/proposals.
    put:
      summary: Miden proposal signing
      description: EVM proposals are approved through /evm/proposals/{proposal_id}/approve.
  /delta/proposal/single:
    get:
      summary: Miden proposal lookup
      description: EVM proposals are fetched through /evm/proposals/{proposal_id}.
components:
  schemas:
    ErrorResponse:
      type: object
      required: [success, code, error]
      properties:
        success:
          type: boolean
          enum: [false]
        code:
          type: string
          description: Stable application error code.
        error:
          type: string
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          enum: [true]
    EvmChallenge:
      type: object
      required: [address, nonce, expires_at, typed_data]
      properties:
        address:
          type: string
        nonce:
          type: string
        expires_at:
          type: integer
        typed_data:
          type: object
    EvmVerifyRequest:
      type: object
      required: [address, nonce, signature]
      properties:
        address:
          type: string
        nonce:
          type: string
        signature:
          type: string
    EvmSession:
      type: object
      required: [address, expires_at]
      properties:
        address:
          type: string
        expires_at:
          type: integer
    RegisterEvmAccountRequest:
      type: object
      required: [chain_id, account_address, multisig_validator_address]
      properties:
        chain_id:
          type: integer
          minimum: 1
        account_address:
          type: string
        multisig_validator_address:
          type: string
    RegisterEvmAccountResponse:
      type: object
      required:
        - account_id
        - chain_id
        - account_address
        - multisig_validator_address
        - signers
        - threshold
      properties:
        account_id:
          type: string
        chain_id:
          type: integer
        account_address:
          type: string
        multisig_validator_address:
          type: string
        signers:
          type: array
          items:
            type: string
        threshold:
          type: integer
    CreateEvmProposalRequest:
      type: object
      required: [account_id, user_op_hash, payload, nonce, signature]
      properties:
        account_id:
          type: string
        user_op_hash:
          type: string
          description: 0x-prefixed bytes32 UserOperation hash supplied by the client.
        payload:
          description: Opaque client payload. Guardian stores and returns it without decoding.
        nonce:
          type: string
          description: Full uint256 EntryPoint nonce as a decimal string.
        ttl_seconds:
          type: integer
        signature:
          type: string
          description: Raw ECDSA signature over user_op_hash.
    ApproveEvmProposalRequest:
      type: object
      required: [account_id, signature]
      properties:
        account_id:
          type: string
        signature:
          type: string
    CancelEvmProposalRequest:
      type: object
      required: [account_id]
      properties:
        account_id:
          type: string
    EvmProposal:
      type: object
      required:
        - proposal_id
        - account_id
        - chain_id
        - smart_account_address
        - validator_address
        - user_op_hash
        - payload
        - nonce
        - nonce_key
        - proposer
        - signer_snapshot
        - threshold
        - signatures
        - created_at
        - expires_at
      properties:
        proposal_id:
          type: string
        account_id:
          type: string
        chain_id:
          type: integer
        smart_account_address:
          type: string
        validator_address:
          type: string
        user_op_hash:
          type: string
        payload: {}
        nonce:
          type: string
        nonce_key:
          type: string
        proposer:
          type: string
        signer_snapshot:
          type: array
          items:
            type: string
        threshold:
          type: integer
        signatures:
          type: array
          items:
            $ref: '#/components/schemas/EvmProposalSignature'
        created_at:
          type: string
        expires_at:
          type: string
    EvmProposalSignature:
      type: object
      required: [signer, signature, signed_at]
      properties:
        signer:
          type: string
        signature:
          type: string
        signed_at:
          type: string
    ListEvmProposalsResponse:
      type: object
      required: [proposals]
      properties:
        proposals:
          type: array
          items:
            $ref: '#/components/schemas/EvmProposal'
    ExecutableEvmProposal:
      type: object
      required: [hash, payload, signatures, signers]
      properties:
        hash:
          type: string
        payload: {}
        signatures:
          type: array
          items:
            type: string
        signers:
          type: array
          items:
            type: string
