version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"    # HTTP
      - "50051:50051"  # gRPC
    volumes:
      - guardian-storage:/var/guardian/storage
      - guardian-metadata:/var/guardian/metadata
      - guardian-keystore:/var/guardian/keystore
    environment:
      - RUST_LOG=info
      - GUARDIAN_STORAGE_PATH=/var/guardian/storage
      - GUARDIAN_METADATA_PATH=/var/guardian/metadata
      - GUARDIAN_KEYSTORE_PATH=/var/guardian/keystore
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=postgres://guardian:${POSTGRES_PASSWORD}@postgres:5432/guardian
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - guardian-postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=guardian
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=guardian
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardian -d guardian"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  guardian-storage:
  guardian-metadata:
  guardian-keystore:
  guardian-postgres:
