---
name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish, e.g. v1.2.3 (pre-release: v1.2.3-rc.1)"
        type: string
        required: true
      branch:
        description: "Branch/tag/commit to build from (default: the ref this run was launched from)"
        type: string
        required: false
      features:
        description: "GUARDIAN_SERVER_FEATURES build arg"
        type: string
        required: false
        default: postgres
      overwrite:
        description: "Allow overwriting an already-published version tag"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: docker-publish
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/openzeppelin/guardian

jobs:
  publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.repository_owner == 'OpenZeppelin'
    environment: release
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION'. Expected a tag like v1.2.3 or a pre-release like v1.2.3-rc.1."
            exit 1
          fi

      - name: Resolve build ref
        id: ref
        env:
          INPUT_BRANCH: ${{ inputs.branch }}
          LAUNCH_REF: ${{ github.ref_name }}
        run: echo "ref=${INPUT_BRANCH:-$LAUNCH_REF}" >> "$GITHUB_OUTPUT"

      - name: Checkout build ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.ref.outputs.ref }}
          persist-credentials: false

      - name: Resolve checked-out commit
        id: commit
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Determine full-release flag
        id: release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ "$VERSION" == *-* ]]; then
            echo "full=false" >> "$GITHUB_OUTPUT"
          else
            echo "full=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Reject already-published version
        if: ${{ !inputs.overwrite }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if docker manifest inspect "${IMAGE}:${VERSION}" > /dev/null 2>&1; then
            echo "::error::${IMAGE}:${VERSION} already exists. Re-run with overwrite=true to replace it."
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          flavor: latest=false
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=sha-${{ steps.commit.outputs.short }}
            type=raw,value=latest,enable=${{ steps.release.outputs.full == 'true' }}
          labels: |
            org.opencontainers.image.title=guardian
            org.opencontainers.image.vendor=openzeppelin
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.revision=${{ steps.commit.outputs.sha }}
            org.openzeppelin.guardian.features=${{ inputs.features }}
            org.openzeppelin.guardian.source-ref=${{ steps.ref.outputs.ref }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: server-runner
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GUARDIAN_SERVER_FEATURES=${{ inputs.features }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Publish summary
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
          SOURCE_REF: ${{ steps.ref.outputs.ref }}
          SHORT_SHA: ${{ steps.commit.outputs.short }}
        run: |
          {
            echo "### Published \`${IMAGE}\`"
            echo
            echo "**Digest:** \`${DIGEST}\`"
            echo
            echo "**Source ref:** \`${SOURCE_REF}\` @ \`${SHORT_SHA}\`"
            echo
            echo "**Tags:**"
            echo '```'
            echo "${TAGS}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
